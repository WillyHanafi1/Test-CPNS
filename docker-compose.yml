services:
  db:
    image: postgres:16-alpine
    container_name: cpns_postgres
    restart: always
    environment:
      POSTGRES_USER: cpns_user
      POSTGRES_PASSWORD: cpns_password
      POSTGRES_DB: cpns_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cpns_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
