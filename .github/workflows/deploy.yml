name: Deploy CPNS Proyek

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/test-cpns
            
            # Memaksa server mengikuti kode terbaru dari GitHub
            git fetch origin main
            git reset --hard origin/main
            
            # Build ulang dengan argumen variabel environment
            # Pastikan variable ini sudah dIset di GitHub Secrets
            docker compose build \
              --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
              --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
              --build-arg NEXT_PUBLIC_MIDTRANS_CLIENT_KEY=${{ secrets.MIDTRANS_CLIENT_KEY }} \
              --build-arg NEXT_PUBLIC_MIDTRANS_IS_PRODUCTION=${{ secrets.MIDTRANS_IS_PRODUCTION }} \
              frontend
            
            docker compose up -d --remove-orphans

            # Menjalankan migrasi database agar tabel baru (Donation, dll) tercipta
            docker compose exec -T backend alembic upgrade head
            
            # Bersihkan sampah image agar hardisk Droplet tidak penuh
            docker image prune -f
